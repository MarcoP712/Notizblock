<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notizblock</title>

    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/notes.css">
    <link rel="stylesheet" href="./style.css">

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>
</head>
<body onload="init()">
    <div class="page_wrapper">
        <header class="hero">
            <div class="hero_badge">Smart Notes</div>
            <h1>Notizblock</h1>
            <p class="hero_text">
                Speichere deine Gedanken, verschiebe Notizen ins Archiv oder lösche sie im Trash.
            </p>
        </header>

        <main class="main_layout">
            <section class="note_form_section">
                <div class="section_topline">Neue Notiz</div>

                <label for="title_input">title</label>
                <input id="title_input" type="text" placeholder="Titel eingeben">

                <label for="content_input">content</label>
                <textarea id="content_input" placeholder="Schreibe hier deine Notiz..."></textarea>

                <button onclick="addNote()">Notiz speichern</button>
            </section>

            <section class="notes_board">
                <section class="notes_section">
                    <div class="section_header">
                        <h2>notes</h2>
                        <span class="section_counter" id="notes_counter">0</span>
                    </div>
                    <div id="notes_content" class="notes_container"></div>
                </section>

                <section class="notes_section">
                    <div class="section_header">
                        <h2>archiv</h2>
                        <span class="section_counter" id="archiv_counter">0</span>
                    </div>
                    <div id="archiv_content" class="notes_container"></div>
                </section>

                <section class="notes_section">
                    <div class="section_header">
                        <h2>trash</h2>
                        <span class="section_counter" id="trash_counter">0</span>
                    </div>
                    <div id="trash_content" class="notes_container"></div>
                </section>
            </section>
        </main>
    </div>
</body>
</html>
